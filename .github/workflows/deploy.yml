name: Publish @qntx/tsconfig

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tree
        uses: actions/checkout@v7

      - name: Set-up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --access public --provenance
        env:
          HUSKY: "0"
